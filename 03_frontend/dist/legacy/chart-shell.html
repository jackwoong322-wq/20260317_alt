<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altcoin Cycle Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="/legacy/chart.css">
</head>
<body>
<div class="header">
  <div class="header-title">ALT<span>/</span>BTC <span style="font-weight:400;font-size:14px;color:var(--text-dim)">CYCLE ANALYZER</span></div>
  <div class="header-info">PEAK-NORMALIZED · BTC PAIR · DAYS SINCE PEAK</div>
</div>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">COINS — SELECT TO COMPARE</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search coin...">
    </div>
    <div class="coin-list" id="coinList"></div>
  </div>
  <div class="main">
    <div class="chart-toolbar">
      <span class="toolbar-label">CYCLES:</span>
      <div class="cycle-toggles" id="cycleToggles"></div>
      <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
        <span class="toolbar-label">SHOW:</span>
        <button class="cycle-btn" id="toggleRange" style="border-color:#4a6080;color:#4a6080;" onclick="toggleHighLow()">HIGH/LOW</button>
        <button class="cycle-btn" id="toggleBox" style="border-color:#4a6080;color:#4a6080;" onclick="toggleBoxZone()">BOX ZONE</button>
        <button class="cycle-btn" id="toggleBearBull" style="border-color:#4a6080;color:#4a6080;" onclick="toggleBearBull()">BEAR/BULL</button>
      </div>
    </div>
    <div class="chart-area">
      <div id="chart"></div>
      <div class="legend" id="legend" style="display:none"></div>
      <div id="bearBullOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;"></div>
      <div id="boxMarksOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;z-index:5;pointer-events:none;"></div>
      <div id="crosshairTooltip"></div>
    </div>
    <div class="stats-bar" id="statsBar"></div>
  </div>
</div>
<script>const ALL_DATA = __CHART_DATA__;</script>
<script type="module" src="/legacy/dist/chart.js"></script>
</body>
</html>
